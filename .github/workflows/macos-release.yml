name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-release:
    runs-on: macos-14

    env:
      KEYCHAIN_PATH: ${{ runner.temp }}/iterm-cd-signing.keychain-db
      APP_CERT_PATH: ${{ runner.temp }}/developer-id-application.p12
      INSTALLER_CERT_PATH: ${{ runner.temp }}/developer-id-installer.p12
      NOTARY_PROFILE: iterm-cd-notary-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode signing certificates
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12 }}" | base64 --decode > "$APP_CERT_PATH"
          echo "${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_P12 }}" | base64 --decode > "$INSTALLER_CERT_PATH"

      - name: Create temporary keychain
        shell: bash
        run: |
          set -euo pipefail
          security create-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security import "$APP_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/pkgbuild
          security import "$INSTALLER_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/pkgbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        shell: bash
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "${{ secrets.MACOS_APPLE_ID }}" \
            --team-id "${{ secrets.MACOS_TEAM_ID }}" \
            --password "${{ secrets.MACOS_APP_SPECIFIC_PASSWORD }}"

      - name: Build signed and notarized release
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}
          ENABLE_SIGNING: "1"
          ENABLE_NOTARIZATION: "1"
          DEVELOPER_ID_APPLICATION: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_NAME }}
          DEVELOPER_ID_INSTALLER: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_NAME }}
          NOTARYTOOL_PROFILE: ${{ env.NOTARY_PROFILE }}
          CODESIGN_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
        run: |
          set -euo pipefail
          zsh packaging/macos/build_release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist/macos/iTerm CD Installer.app
            dist/macos/iTerm CD Uninstaller.app
            dist/macos/iTerm CD Installer.pkg
            dist/macos/iTerm-CD-macOS.dmg

      - name: Publish GitHub Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/iTerm CD Installer.pkg
            dist/macos/iTerm-CD-macOS.dmg
